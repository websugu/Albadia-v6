const app = initializeApp(firebaseConfig);

let currentUser = null;
let allChats = [];

let archivedChats = [];

let isShowingGroupsOnly = false;

const chatsList = document.getElementById("chats-list");
const searchInput = document.getElementById("search-input");

// Advanced: pin favorites in chat list (persisted on user doc)
const PINNED_KEY = "pinnedChats"; // array of contactId or groupId identifiers

function isChatPinned(chatId) {
  const pinned = currentUser?.[PINNED_KEY] || [];
  return Array.isArray(pinned) && pinned.includes(chatId);
}

async function ensurePinnedLoaded() {
  if (!currentUser) return;
  if (!Array.isArray(currentUser[PINNED_KEY])) {
    try {
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      if (snap.exists()) {
        const data = snap.data();
        currentUser[PINNED_KEY] = data[PINNED_KEY] || [];
      } else {
        currentUser[PINNED_KEY] = [];
      }
    } catch (e) {
      currentUser[PINNED_KEY] = [];
    }
  }
}

async function togglePinChat(chat) {
  const id = chat.isGroup ? chat.chatId : chat.contactId;
  await ensurePinnedLoaded();
  const pinned = currentUser[PINNED_KEY] || [];
  const next = pinned.includes(id) ? pinned.filter(x => x !== id) : [...pinned, id];
  currentUser[PINNED_KEY] = next;
  try {
    await updateDoc(doc(db, "users", currentUser.uid), { pinnedChats: next });
  } catch (e) {}
  renderChats(allChats);
}

const archiveToggleBtn = document.getElementById("archive-toggle");
const groupsToggleBtn = document.getElementById("groups-toggle");
const unreadToggleBtn = document.getElementById("unread-toggle");
const allToggleBtn = document.getElementById("all-toggle");
let isShowingUnreadOnly = false;
let currentFilter = 'all'; // 'all', 'groups', 'archived', 'unread'

searchInput.addEventListener("input", function(e) {
  filterChats(e.target.value.toLowerCase().trim());
});

archiveToggleBtn.addEventListener("click", toggleArchiveView);

// All Chats Toggle Function
allToggleBtn.addEventListener("click", function() {
  currentFilter = 'all';
  
  // Update all button appearances
  allToggleBtn.classList.add("active");
  groupsToggleBtn.classList.remove("active");
  unreadToggleBtn.classList.remove("active");
  
  // Reset button labels
  groupsToggleBtn.innerHTML = '<i class="ri-group-line"></i> Groups';
  unreadToggleBtn.innerHTML = '<i class="ri-message-3-line"></i> Unread';
  
  // Render all chats
  renderChats(allChats);
});

// Groups Toggle Function
groupsToggleBtn.addEventListener("click", toggleGroupsView);

// Unread Toggle Function
unreadToggleBtn.addEventListener("click", toggleUnreadView);

function toggleUnreadView() {
  isShowingUnreadOnly = !isShowingUnreadOnly;
  
  // Update all button appearances
  unreadToggleBtn.classList.add("active");
  allToggleBtn.classList.remove("active");
  groupsToggleBtn.classList.remove("active");
  archiveToggleBtn.classList.remove("active");
  
  // Update button label and reset others
  if (isShowingUnreadOnly) {
    unreadToggleBtn.innerHTML = '<i class="ri-chat-3-line"></i> All Chats';
  } else {
    unreadToggleBtn.classList.remove("active");
    unreadToggleBtn.innerHTML = '<i class="ri-message-3-line"></i> Unread';
  }
  
  // Reset other button labels
  groupsToggleBtn.innerHTML = '<i class="ri-group-line"></i> Groups';
  archiveToggleBtn.innerHTML = '<i class="ri-archive-line"></i> Archived';
  allToggleBtn.innerHTML = '<i class="ri-chat-3-line"></i> All';
  
  // Filter and render
  if (isShowingUnreadOnly) {
    const unreadChats = allChats.filter(chat => chat.hasUnread);
    renderChats(unreadChats);
  } else {
    renderChats(allChats);
  }
}

function toggleGroupsView() {
  isShowingGroupsOnly = !isShowingGroupsOnly;
  
  // Update all button appearances
  groupsToggleBtn.classList.add("active");
  allToggleBtn.classList.remove("active");
  unreadToggleBtn.classList.remove("active");
  archiveToggleBtn.classList.remove("active");
  
  // Update button label and reset others
  if (isShowingGroupsOnly) {
    groupsToggleBtn.innerHTML = '<i class="ri-chat-3-line"></i> All Chats';
  } else {
    groupsToggleBtn.classList.remove("active");
    groupsToggleBtn.innerHTML = '<i class="ri-group-line"></i> Groups';
  }
  
  // Reset other button labels
  unreadToggleBtn.innerHTML = '<i class="ri-message-3-line"></i> Unread';
  archiveToggleBtn.innerHTML = '<i class="ri-archive-line"></i> Archived';
  allToggleBtn.innerHTML = '<i class="ri-chat-3-line"></i> All';
  
  // Filter and render
  if (isShowingGroupsOnly) {
    renderChats(groupChatsOnly);
  } else {
    renderChats(allChats);
  }
}

function filterChats(searchTerm) {
  const chatsToFilter = isShowingArchived ? archivedChats : allChats;
  if (!searchTerm) { renderChats(chatsToFilter); return; }
  const filtered = chatsToFilter.filter(chat => 
    (chat.contactName || "").toLowerCase().includes(searchTerm) ||
    (chat.lastMessage || "").toLowerCase().includes(searchTerm)
  );
  renderChats(filtered);
}

// Archive Functions
async function toggleArchiveView() {
  isShowingArchived = !isShowingArchived;
  
  // Update all button appearances
  archiveToggleBtn.classList.add("active");
  allToggleBtn.classList.remove("active");
  groupsToggleBtn.classList.remove("active");
  unreadToggleBtn.classList.remove("active");
  
  archiveToggleBtn.innerHTML = isShowingArchived 
    ? '<i class="ri-inbox-unarchive-line"></i> Back to Chats' 
    : '<i class="ri-archive-line"></i> Archived';
  
  // Reset other button labels
  groupsToggleBtn.innerHTML = '<i class="ri-group-line"></i> Groups';
  unreadToggleBtn.innerHTML = '<i class="ri-message-3-line"></i> Unread';
  allToggleBtn.innerHTML = '<i class="ri-chat-3-line"></i> All';
  
  if (isShowingArchived) {
    await loadArchivedChats();
  } else {
    renderChats(allChats);
  }
}

async function loadArchivedChats() {
  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  if (!userDoc.exists()) return;
  
  const userData = userDoc.data();
  archivedChats = [];
  
  // Get archived individual chats
  const archivedIndividualChats = userData.archivedChats || [];
  
  // Get archived group chats
  const archivedGroupChats = userData.archivedGroupChats || [];
  
  // Get all messages
  const allMessages = await getDocs(collection(db, "messages"));
  
  // Process archived individual chats
  for (const chat of archivedIndividualChats) {
    const contactDoc = await getDoc(doc(db, "users", chat.contactId));
    if (!contactDoc.exists()) continue;
    
    const contactData = contactDoc.data();
    
    let lastMessageText = "No messages yet";
    let latestTime = 0;
    let latestMsg = null;
    let hasUnread = false;
    
    allMessages.forEach(msgDoc => {
      const msgData = msgDoc.data();
      const isBetweenUsers = 
        (msgData.senderId === currentUser.uid && msgData.receiverId === chat.contactId) ||
        (msgData.senderId === chat.contactId && msgData.receiverId === currentUser.uid);
      
      if (isBetweenUsers) {
        const msgTime = msgData.timestamp ? (msgData.timestamp.toDate ? msgData.timestamp.toDate().getTime() : new Date(msgData.timestamp).getTime()) : 0;
        
        if (msgTime > latestTime) {
          latestTime = msgTime;
          latestMsg = msgData;
        }
        
        if (msgData.senderId === chat.contactId && msgData.read !== true) {
          hasUnread = true;
        }
      }
    });
    
    if (latestMsg) {
      if (latestMsg.type === "text") lastMessageText = latestMsg.text;
      else if (latestMsg.type === "image") lastMessageText = "📷 Photo";
      else if (latestMsg.type === "audio") lastMessageText = "🎤 Voice message";
    }

    archivedChats.push({
      chatId: chat.chatId,
      contactId: chat.contactId,
      contactName: contactData.firstName + " " + contactData.lastName,
      contactImage: contactData.profileImageUrl,
      lastMessage: lastMessageText,
      lastMessageTime: latestTime,
      hasUnread: hasUnread,
      isGroup: false,
      isArchived: true
    });
  }

  // Process archived group chats
  for (const groupId of archivedGroupChats) {
    const groupDoc = await getDoc(doc(db, "groups", groupId));
    if (!groupDoc.exists()) continue;
    
    const groupData = groupDoc.data();
    
    let lastMessageText = "No messages yet";
    let latestTime = 0;
    let latestMsg = null;
    let hasUnread = false;
    
    allMessages.forEach(msgDoc => {
      const msgData = msgDoc.data();
      
      if (msgData.groupId === groupId) {
        const msgTime = msgData.timestamp ? (msgData.timestamp.toDate ? msgData.timestamp.toDate().getTime() : new Date(msgData.timestamp).getTime()) : 0;
        
        if (msgTime > latestTime) {
          latestTime = msgTime;
          latestMsg = msgData;
        }
        
        if (msgData.senderId !== currentUser.uid && !msgData.read) {
          hasUnread = true;
        }
      }
    });
    
    if (latestMsg) {
      if (latestMsg.type === "text") {
        lastMessageText = latestMsg.senderName + ": " + latestMsg.text;
      } else if (latestMsg.type === "image") {
        lastMessageText = latestMsg.senderName + ": 📷 Photo";
      } else if (latestMsg.type === "audio") {
        lastMessageText = latestMsg.senderName + ": 🎤 Voice message";
      }
    }

    archivedChats.push({
      chatId: groupId,
      contactId: groupId,
      contactName: groupData.groupName,
      contactImage: groupData.groupImageUrl,
      lastMessage: lastMessageText,
      lastMessageTime: latestTime,
      hasUnread: hasUnread,
      isGroup: true,
      isArchived: true
    });
  }

  renderChats(archivedChats);
}

async function archiveChat(chat) {
  try {
    const userRef = doc(db, "users", currentUser.uid);
    
    if (chat.isGroup) {
      // Remove from groupChats and add to archivedGroupChats
      await updateDoc(userRef, {
        groupChats: arrayRemove(chat.chatId),
        archivedGroupChats: arrayUnion(chat.chatId)
      });
    } else {
      // Remove from chats and add to archivedChats
      await updateDoc(userRef, {
        chats: arrayRemove({ contactId: chat.contactId, chatId: chat.chatId }),
        archivedChats: arrayUnion({ contactId: chat.contactId, chatId: chat.chatId })
      });
    }
    
    // Remove from local array
    allChats = allChats.filter(c => c.contactId !== chat.contactId);
    renderChats(allChats);
    
    // Show feedback
    showToast("Chat archived");
  } catch (error) {
    console.error("Error archiving chat:", error);
    showToast("Failed to archive chat");
  }
}

async function restoreChat(chat) {
  try {
    const userRef = doc(db, "users", currentUser.uid);
    
    if (chat.isGroup) {
      // Remove from archivedGroupChats and add to groupChats
      await updateDoc(userRef, {
        archivedGroupChats: arrayRemove(chat.chatId),
        groupChats: arrayUnion(chat.chatId)
      });
    } else {
      // Remove from archivedChats and add to chats
      await updateDoc(userRef, {
        archivedChats: arrayRemove({ contactId: chat.contactId, chatId: chat.chatId }),
        chats: arrayUnion({ contactId: chat.contactId, chatId: chat.chatId })
      });
    }
    
    // Remove from local archived array
    archivedChats = archivedChats.filter(c => c.contactId !== chat.contactId);
    renderChats(archivedChats);
    
    // Show feedback
    showToast("Chat restored");
  } catch (error) {
    console.error("Error restoring chat:", error);
    showToast("Failed to restore chat");
  }
}

function showToast(message) {
  const toast = document.createElement("div");
  toast.className = "toast-message";
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 14px;
    z-index: 1000;
    animation: fadeInUp 0.3s ease;
  `;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.remove();
  }, 2000);
}

function formatTime(timestamp) {
  if (!timestamp) return "";
  const date = new Date(timestamp);
  const now = new Date();
  const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  
  if (diffDays === 0) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } else if (diffDays === 1) {
    return "Yesterday";
  } else if (diffDays < 7) {
    return date.toLocaleDateString([], { weekday: 'short' });
  } else {
    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }
}

function renderChats(chats) {
  chatsList.innerHTML = "";
  if (chats.length === 0) {
    const emptyMessage = isShowingArchived ? "No archived chats" : "No chats yet";
    chatsList.innerHTML = '<div style="text-align: center; padding: 50px; color: #999;">' + emptyMessage + '</div>';
    return;
  }

  // Sort by latest message timestamp (newest first)
  chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));

  // Remove duplicates by contactId before rendering
  const uniqueChats = [];
  const seenIds = new Set();
  for (const chat of chats) {
    if (!seenIds.has(chat.contactId)) {
      seenIds.add(chat.contactId);
      uniqueChats.push(chat);
    }
  }

  for (const chat of uniqueChats) {
    const chatDiv = document.createElement("div");
    chatDiv.className = "chat";

    let badgeHtml = "";
    // Show unread count badge.
    // Chat objects set `hasUnread` (boolean). Show badge when true.
    const unreadCount = typeof chat.unreadCount === 'number'
      ? chat.unreadCount
      : (chat.hasUnread ? 1 : 0);

    badgeHtml = (unreadCount > 0)
      ? '<span class="unread-badge">' + (unreadCount > 99 ? '99+' : unreadCount) + '</span>'
      : '';

    // Debug helper (kept lightweight): add data attribute so we can inspect in DOM
    chatDiv.dataset.hasUnread = String(!!chat.hasUnread);


    // Determine if showing archive or restore button
    const isArchived = chat.isArchived;
    const archiveBtnIcon = isArchived ? "ri-inbox-unarchive-line" : "ri-archive-line";
    const archiveBtnTitle = isArchived ? "Restore chat" : "Archive chat";
    const archiveBtnClass = isArchived ? "chat-archive-btn restore" : "chat-archive-btn";

    const pinId = chat.isGroup ? chat.chatId : chat.contactId;
    const pinned = isChatPinned(pinId);
    const pinBtnClass = pinned ? "chat-pin-btn pinned" : "chat-pin-btn";
    const pinIcon = pinned ? "ri-pin-fill" : "ri-pushpin-line";

    chatDiv.innerHTML =
      "<div class='chat-users'>" +
        "<div class='chat-users-main'>" +
          "<div class='open-chat-btn' data-contact='" + chat.contactId + "'>" +
            "<div class='chat-users-content'>" +
              "<div><img src='" + (chat.contactImage || "images/default-profile.png") + "' style='border-radius: 50%;width: 63px;height: 63px;'></div>" +
              "<div class='user-name'>" +
                "<div><h3>" + chat.contactName + "</h3></div>" +
                "<div><p>" + chat.lastMessage + "</p></div>" +
              "</div>" +
            "</div>" +
          "</div>" +
        "</div>" +
        "<div class='chat-info'>" +
            "<div class='chat-meta'>" +
              "<span class='chat-time'>" + formatTime(chat.lastMessageTime) + "</span>" +
              badgeHtml +
              "<button class='" + pinBtnClass + "' title='" + (pinned ? "Unpin" : "Pin") + "'>" +
                "<i class='" + pinIcon + "'></i>" +
              "</button>" +
              "<button class='" + archiveBtnClass + "' title='" + archiveBtnTitle + "'>" +
                "<i class='" + archiveBtnIcon + "'></i>" +
              "</button>" +
            "</div>" +
          "</div>" +
      "</div>";


    // Add click event for opening chat
    chatDiv.querySelector(".open-chat-btn").addEventListener("click", () => {
      if (chat.isGroup) {
        window.location.href = "chatting.html?groupId=" + chat.chatId;
      } else {
        window.location.href = "chatting.html?contactId=" + chat.contactId;
      }
    });

    // Add click event for pin/unpin button
    const pinBtn = chatDiv.querySelector(".chat-pin-btn");
    if (pinBtn) {
      pinBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        await togglePinChat(chat);
      });
    }

    // Add click event for archive/restore button
    const archiveBtn = chatDiv.querySelector(".chat-archive-btn");

    archiveBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isArchived) {
        restoreChat(chat);
      } else {
        archiveChat(chat);
      }
    });

    chatsList.appendChild(chatDiv);
  }
}

async function displayChats() {
  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  if (!userDoc.exists()) return;
  
  const userData = userDoc.data();
  const chats = userData.chats || [];
  const groupChats = userData.groupChats || [];
  allChats = [];
  
  if (chats.length === 0 && groupChats.length === 0) {
    chatsList.innerHTML = '<button id="add-contact-btn" style="padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 20px auto; display: block;">Add Contact</button>';
    document.getElementById("add-contact-btn").addEventListener("click", () => window.location.href = "contacts.html");
    return;
  }

  // Get all messages once
  const allMessages = await getDocs(collection(db, "messages"));

  // Process individual chats
  // Deduplicate chats array by contactId before processing
  const uniqueChats = [];
  const seenContactIds = new Set();
  for (const chat of chats) {
    if (!seenContactIds.has(chat.contactId)) {
      seenContactIds.add(chat.contactId);
      uniqueChats.push(chat);
    }
  }

  for (const chat of uniqueChats) {
    const contactDoc = await getDoc(doc(db, "users", chat.contactId));
    if (!contactDoc.exists()) continue;
    
    const contactData = contactDoc.data();
    
    // Find latest message between current user and this contact
    let lastMessageText = "No messages yet";
    let latestTime = 0;
    let latestMsg = null;
    let hasUnread = false;
    
    allMessages.forEach(msgDoc => {
      const msgData = msgDoc.data();
      const isBetweenUsers = 
        (msgData.senderId === currentUser.uid && msgData.receiverId === chat.contactId) ||
        (msgData.senderId === chat.contactId && msgData.receiverId === currentUser.uid);
      
      if (isBetweenUsers) {
        const msgTime = msgData.timestamp ? (msgData.timestamp.toDate ? msgData.timestamp.toDate().getTime() : new Date(msgData.timestamp).getTime()) : 0;
        
        // Check if latest message from contact is unread
        // unread is determined by the newest message itself
        // (if it's unread, badge should appear)
        if (msgData.senderId === chat.contactId && msgData.read !== true) {
          if (msgTime > latestTime) {
            latestTime = msgTime;
            latestMsg = msgData;
            hasUnread = true;
          }
        }
        
        // Also track latest message regardless of read status
        if (msgTime > latestTime) {
          latestTime = msgTime;
          latestMsg = msgData;
        }
      }
    });
    
    if (latestMsg) {
      if (latestMsg.type === "text") lastMessageText = latestMsg.text;
      else if (latestMsg.type === "image") lastMessageText = "📷 Photo";
      else if (latestMsg.type === "audio") lastMessageText = "🎤 Voice message";
      
      // Check if the latest message from contact is unread
      if (latestMsg.senderId === chat.contactId && latestMsg.read !== true) {
        hasUnread = true;
      }
    }

    allChats.push({
      chatId: chat.chatId,
      contactId: chat.contactId,
      contactName: contactData.firstName + " " + contactData.lastName,
      contactImage: contactData.profileImageUrl,
      lastMessage: lastMessageText,
      lastMessageTime: latestTime,
      hasUnread: hasUnread,
      isGroup: false
    });
  }

  // Process group chats
  for (const groupId of groupChats) {
    const groupDoc = await getDoc(doc(db, "groups", groupId));
    if (!groupDoc.exists()) continue;
    
    const groupData = groupDoc.data();
    
    // Find latest message for this group
    let lastMessageText = "No messages yet";
    let latestTime = 0;
    let latestMsg = null;
    let hasUnread = false;
    
    allMessages.forEach(msgDoc => {
      const msgData = msgDoc.data();
      
      // Check if message is for this group
      if (msgData.groupId === groupId) {
        const msgTime = msgData.timestamp ? (msgData.timestamp.toDate ? msgData.timestamp.toDate().getTime() : new Date(msgData.timestamp).getTime()) : 0;
        
        // Check if latest message from other members is unread
        if (msgData.senderId !== currentUser.uid && msgData.read !== true) {
          if (msgTime > latestTime) {
            latestTime = msgTime;
            latestMsg = msgData;
            hasUnread = true;
          }
        }
        
        // Also track latest message regardless of read status
        if (msgTime > latestTime) {
          latestTime = msgTime;
          latestMsg = msgData;
        }
      }
    });
    
    if (latestMsg) {
      if (latestMsg.type === "text") {
        lastMessageText = latestMsg.senderName + ": " + latestMsg.text;
      } else if (latestMsg.type === "image") {
        lastMessageText = latestMsg.senderName + ": 📷 Photo";
      } else if (latestMsg.type === "audio") {
        lastMessageText = latestMsg.senderName + ": 🎤 Voice message";
      }
      
      // Check if latest message is unread
      if (latestMsg.senderId !== currentUser.uid && !latestMsg.read) {
        hasUnread = true;
      }
    }

    const groupChat = {
      chatId: groupId,
      contactId: groupId,
      contactName: groupData.groupName,
      contactImage: groupData.groupImageUrl,
      lastMessage: lastMessageText,
      lastMessageTime: latestTime,
      hasUnread: hasUnread,
      isGroup: true,
      memberCount: groupData.memberIds ? groupData.memberIds.length : 0
    };
    
    allChats.push(groupChat);
    groupChatsOnly.push(groupChat);
  }

  renderChats(allChats);
}

// Real-time listener for chats updates
function setupChatsListener() {
  if (!currentUser) return;
  
  const userRef = doc(db, "users", currentUser.uid);
  
  // Use onSnapshot to listen for real-time updates
  onSnapshot(userRef, function(snapshot) {
    if (snapshot.exists()) {
      // Re-fetch and display chats when data changes
      displayChats();
    }
  });
}

// =====================
// NOTIFICATION SYSTEM
// =====================

// Initialize notification system
async function initNotifications() {
  try {
    // Load notification scripts
    await import('./js/notifications.js');
    await import('./js/fcm-service.js');
    
    // Initialize if functions exist
    if (window.initNotificationSystem) window.initNotificationSystem();
    if (window.initFCMService) await window.initFCMService();
    if (window.loadNotificationPrefs) window.loadNotificationPrefs();
    
    // Update badge
    if (window.updateBadgeDisplay && window.getUnreadCount) {
      window.updateBadgeDisplay(window.getUnreadCount());
    }
    
    console.log('Notification system initialized');
  } catch (error) {
    console.warn('Notification init error:', error.message);
  }
}

// Set up notification bell button
function setupNotificationBell() {
  const bellBtn = document.getElementById('notification-bell');
  if (bellBtn) {
    bellBtn.addEventListener('click', () => {
      if (window.openNotificationCenter) {
        window.openNotificationCenter();
      }
    });
  }
}

// Clear badge when user views chats
function setupBadgeClearing() {
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      if (window.clearBadge) window.clearBadge();
      if (window.updateBadgeDisplay && window.getUnreadCount) {
        window.updateBadgeDisplay(window.getUnreadCount());
      }
    }
  });
  
  window.addEventListener('focus', () => {
    if (window.clearBadge) window.clearBadge();
    if (window.updateBadgeDisplay && window.getUnreadCount) {
      window.updateBadgeDisplay(window.getUnreadCount());
    }
  });
}

onAuthStateChanged(auth, function(user) {
  if (user) {
    currentUser = user;
    // Load pinned chats list for UI
    ensurePinnedLoaded().then(() => displayChats());


    setupChatsListener(); // Set up real-time listener
    
    // Initialize notification system after user is authenticated
    initNotifications();
    setupNotificationBell();
    setupBadgeClearing();
  } else {
    window.location.href = "auth.html";
  }
});
