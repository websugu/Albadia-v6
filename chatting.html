<script type="module">

import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBX74wlrm96EE9zO7QQYSI21xGp_eO40IE",
  authDomain: "posts-c532d.firebaseapp.com",

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let contactId = null;
let selectionMode = false;
let selectedMessages = new Set();
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let isPaused = false;
let recordingTimeout = null;
let audioContext = null;
let analyser = null;
let dataArray = null;
let animationId = null;
let recordingStartTime = null;
let pausedTime = 0;

const chatMessages = document.getElementById("chat-messages");

const selectionToolbar = document.getElementById("selection-toolbar");
const chatHeader = document.getElementById("chat-header");

const urlParams = new URLSearchParams(window.location.search);
contactId = urlParams.get("contactId");
let groupId = urlParams.get("groupId");
let isGroupChat = !!groupId;

console.log("contactId:", contactId, "groupId:", groupId, "isGroupChat:", isGroupChat);

if (!contactId && !groupId) {
  alert("Invalid chat link");
  window.location.href = "chats.html";
}

// For group chats, use groupId as the identifier
if (isGroupChat) {
  contactId = groupId;
}

// =====================
// MARK MESSAGES AS READ
// =====================

async function markMessagesAsRead() {
  if (!currentUser || !contactId) return;

  try {
    // Keep backward compatibility with existing schema (no indexed query yet)
    // but avoid re-marking already read messages.
    const snapshot = await getDocs(collection(db, "messages"));
    const unreadMessages = [];

    snapshot.forEach((docSnap) => {
      const msg = docSnap.data();
      const msgId = docSnap.id;

      if (msg.deleted) return;

      // Group chat: mark messages inside the group that are unread for this user.
      if (isGroupChat) {
        if (msg.groupId === groupId && msg.receiverId === currentUser.uid && !msg.read) {
          unreadMessages.push(msgId);
        }
        return;
      }

      // Individual chat
      if (msg.senderId === contactId && msg.receiverId === currentUser.uid && !msg.read) {
        unreadMessages.push(msgId);
      }
    });

    for (const msgId of unreadMessages) {
      await updateDoc(doc(db, "messages", msgId), {
        read: true,
        readAt: serverTimestamp(),
      });
    }

    console.log("Marked " + unreadMessages.length + " messages as read");
  } catch (error) {
    console.error("Error marking messages as read:", error);
  }
}


// =====================
// LOAD MESSAGES
// =====================

async function loadMessages() {
  console.log("Loading messages for contact:", contactId);
  
  chatMessages.innerHTML = '<div class="no-messages">Loading messages...</div>';
  
  try {
    const snapshot = await getDocs(collection(db, "messages"));
    console.log("Total messages in DB:", snapshot.size);
    
    let messages = [];
    
    snapshot.forEach((doc) => {
      const msg = doc.data();
      msg.id = doc.id;
      messages.push(msg);
    });
    
    // Filter messages between current user and contact or group messages
    messages = messages.filter(msg => {
      // For group chats, check if message belongs to this group
      if (isGroupChat && msg.groupId === groupId) {
        return true;
      }
      
      // For individual chats
      const isFromContact = msg.senderId === contactId;
      const isToContact = msg.receiverId === contactId;
      const isFromUser = msg.senderId === currentUser?.uid;
      const isToUser = msg.receiverId === currentUser?.uid;
      
      return (isFromContact && isToUser) || (isFromUser && isToContact);
    });
    
    // Sort by timestamp
    messages.sort((a, b) => {
      const timeA = a.timestamp ? (a.timestamp.toDate ? a.timestamp.toDate().getTime() : new Date(a.timestamp).getTime()) : 0;
      const timeB = b.timestamp ? (b.timestamp.toDate ? b.timestamp.toDate().getTime() : new Date(b.timestamp).getTime()) : 0;
      return timeA - timeB;
    });
    
    chatMessages.innerHTML = "";
    
    if (messages.length === 0) {
      chatMessages.innerHTML = '<div class="no-messages">No messages yet. Say hi!</div>';
    } else {
      messages.forEach(msg => displayMessage(msg));
    }
    
    // Mark messages as read after loading
    await markMessagesAsRead();
    
  } catch (error) {
    console.error("Error loading:", error);
    chatMessages.innerHTML = '<div class="no-messages">Error: ' + error.message + '</div>';
  }
}

// =====================
// REAL-TIME LISTENER
// =====================

function setupRealtime() {
  console.log("Setting up real-time...");
  
  onSnapshot(collection(db, "messages"), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      if (change.type === "added") {
        const msg = change.doc.data();
        msg.id = change.doc.id;
        
        // For group chats, check if message belongs to this group
        let isRelevantMessage = false;
        if (isGroupChat && msg.groupId === groupId) {
          isRelevantMessage = true;
        } else {
          // For individual chats
          const isFromContact = msg.senderId === contactId;
          const isToContact = msg.receiverId === contactId;
          const isFromUser = msg.senderId === currentUser?.uid;
          const isToUser = msg.receiverId === currentUser?.uid;
          isRelevantMessage = (isFromContact && isToUser) || (isFromUser && isToContact);
        }
        
        if (isRelevantMessage) {
          console.log("New message:", msg.text);
          displayMessage(msg);
          
          const noMsg = chatMessages.querySelector('.no-messages');
          if (noMsg) noMsg.remove();
          
          // Mark new incoming messages as read (for WhatsApp-like behavior)
          // Only mark unread messages coming from the other side.
          if (msg.senderId !== currentUser?.uid && msg.read !== true) {
            updateDoc(doc(db, "messages", msg.id), {
              read: true,
              readAt: serverTimestamp()
            });
          }
        }
      }
    });
  });
}

// =====================
// HELPER FUNCTIONS FOR DOCUMENTS
// =====================

function getDocumentIcon(fileName) {
  const extension = (fileName || "").split(".").pop().toLowerCase();
  if (extension === "pdf") {
    return '<i class="ri-file-pdf-line" style="font-size: 32px; color: #e74c3c;"></i>';
  } else if (["doc", "docx"].indexOf(extension) !== -1) {
    return '<i class="ri-file-word-line" style="font-size: 32px; color: #2196F3;"></i>';
  } else if (["xls", "xlsx"].indexOf(extension) !== -1) {
    return '<i class="ri-file-excel-line" style="font-size: 32px; color: #4CAF50;"></i>';
  } else if (["ppt", "pptx"].indexOf(extension) !== -1) {
    return '<i class="ri-file-ppt-line" style="font-size: 32px; color: #ff9800;"></i>';
  } else if (extension === "txt") {
    return '<i class="ri-file-text-line" style="font-size: 32px; color: #9E9E9E;"></i>';
  } else {
    return '<i class="ri-file-line" style="font-size: 32px; color: #9E9E9E;"></i>';
  }
}

function formatFileSize(bytes) {
  if (!bytes || bytes === 0) return "0 B";
  const k = 1024;
  const sizes = ["B", "KB", "MB", "GB"];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + " " + sizes[i];
}

// =====================
// DISPLAY MESSAGE
// =====================

function formatTime(timestamp) {
  if (!timestamp) return "";
  try {
    let date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return ""; }
}

function displayMessage(msg) {
  if (document.querySelector(`[data-id="${msg.id}"]`)) return;

  // Ensure custom voice UI is wired even after dynamic rendering.

  
  const isSent = msg.senderId === currentUser?.uid;
  const isGroupMessage = isGroupChat && !isSent;
  const div = document.createElement("div");
  div.className = isSent ? "sent" : "received";
  div.dataset.id = msg.id;
  div.dataset.senderId = msg.senderId;
  
  // For group messages from others, add sender info wrapper
  let senderInfoHtml = '';
  if (isGroupMessage && msg.senderName) {
    senderInfoHtml = `
      <div class="message-sender-info" data-sender-id="${msg.senderId}">
        <img src="${msg.senderImage || 'images/default-profile.png'}" alt="${msg.senderName}">
        <span>${msg.senderName}</span>
      </div>
    `;
  }
  
  // Click for selection mode
  div.addEventListener("click", function(e) {
    if (selectionMode) {
      toggleSelection(msg.id);
    } else if (isGroupMessage && !isSent) {
      // Show sender info panel for group messages
      showSenderInfoPanel(msg.senderId, msg.senderName, msg.senderImage);
    }
  });
  
// Long press for delete
  let longPressTimer;
  div.addEventListener("mousedown", function() {
    longPressTimer = setTimeout(() => {
      if (msg.senderId === currentUser?.uid) enterSelectionMode(msg.id);
    }, 500);
  });
  div.addEventListener("mouseup", function() { clearTimeout(longPressTimer); });
  div.addEventListener("mouseleave", function() { clearTimeout(longPressTimer); });
  
  // Right-click for WhatsApp style menu
  div.addEventListener("contextmenu", function(e) {
    e.preventDefault();
    showMessageMenu(div, msg.id, msg, e);
  });
  
  // Long press on mobile also shows menu
  div.addEventListener("touchstart", function(e) {
    longPressTimer = setTimeout(() => {
      showMessageMenu(div, msg.id, msg, e);
    }, 500);
  });
  div.addEventListener("touchend", function() { clearTimeout(longPressTimer); });
  
  if (msg.deleted) {
    div.innerHTML = '<span style="color: #999; font-style: italic;">This message was deleted</span>';
  } else {
    // For group messages from others, add sender info
    let senderInfoHtml = '';
    if (isGroupMessage && msg.senderName) {
      senderInfoHtml = `
        <div class="message-sender-info" data-sender-id="${msg.senderId}">
          <img src="${msg.senderImage || 'images/default-profile.png'}" alt="${msg.senderName}" style="width:20px;height:20px;border-radius:50%;vertical-align:middle;margin-right:5px;">
          <span style="font-size:11px;font-weight:600;color:#667eea;">${msg.senderName}</span>
        </div>
      `;
    }
    
    let content = "";
    if (msg.type === "text") content = msg.text || "";
    else if (msg.type === "image") content = '<img src="' + (msg.imageUrl || "") + '" class="message-img" onclick="window.open(this.src)">';
    else if (msg.type === "audio") content = senderInfoHtml + `
      <div class="voice-message" data-audio-wrapper="${msg.id}">
        <div class="voice-top">
          <i class="ri-mic-2-line"></i>
          <span class="voice-label">Voice</span>
        </div>
        <div class="voice-player">
          <button class="voice-play" type="button" aria-label="Play">
            <i class="ri-play-fill"></i>
          </button>
          <div class="voice-progress">
            <div class="voice-progress-bar"></div>
            <div class="voice-progress-fill" style="width: 0%"></div>
          </div>
          <div class="voice-time">
            <span class="voice-current">0:00</span>
            <span class="voice-sep">/</span>
            <span class="voice-duration">0:00</span>
          </div>
          <audio class="voice-audio" src="${msg.audioUrl || ""}" preload="metadata"></audio>
        </div>
      </div>
    `;

    else if (msg.type === "document") {
      const docIcon = getDocumentIcon(msg.documentName || "");
      content = senderInfoHtml + '<div class="document-message" onclick="showDocumentViewer(\'' + (msg.documentUrl || "") + '\', \'' + (msg.documentName || "document") + '\')" style="cursor: pointer; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; display: flex; align-items: center; gap: 10px;">' + docIcon + '<div style="flex: 1; overflow: hidden;"><div style="font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">' + (msg.documentName || "Document") + '</div><div style="font-size: 12px; color: #666;">' + formatFileSize(msg.documentSize) + '</div></div><i class="ri-download-line" style="font-size: 20px; color: #667eea;"></i></div>';
    }
    else content = "[" + (msg.type || "message") + "]";
    
    // Show edited indicator if message was edited
    let editedIndicator = "";
    if (msg.edited) {
      editedIndicator = '<span style="font-size: 10px; opacity: 0.7; margin-left: 5px;">(edited)</span>';
    }
    
    div.innerHTML = senderInfoHtml + content + '<span class="timestamp">' + formatTime(msg.timestamp) + '</span>' + editedIndicator + displayReactions(msg.reactions);
  }
  
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  // Wire custom voice UI controls.
  if (msg.type === "audio") {
    const wrapper = div.querySelector('.voice-message');
    const audioEl = div.querySelector('audio.voice-audio');
    const playBtn = div.querySelector('button.voice-play');
    const currentEl = div.querySelector('.voice-current');
    const durationEl = div.querySelector('.voice-duration');
    const fillEl = div.querySelector('.voice-progress-fill');

    if (wrapper && audioEl && playBtn && currentEl && durationEl && fillEl) {
      const fmt = (sec) => {
        if (!isFinite(sec) || sec < 0) sec = 0;
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + s.toString().padStart(2, '0');
      };

      const setFillFromTime = () => {
        const dur = audioEl.duration || 0;
        const cur = audioEl.currentTime || 0;
        currentEl.textContent = fmt(cur);
        if (dur) durationEl.textContent = fmt(dur);
        const pct = dur ? (cur / dur) * 100 : 0;
        fillEl.style.width = pct.toFixed(2) + '%';
      };

      const setPlayIcon = (playing) => {
        const icon = playBtn.querySelector('i');
        if (!icon) return;
        if (playing) {
          icon.className = 'ri-pause-fill';
        } else {
          icon.className = 'ri-play-fill';
        }
      };

      audioEl.addEventListener('loadedmetadata', () => {
        durationEl.textContent = fmt(audioEl.duration || 0);
        setFillFromTime();
      });

      audioEl.addEventListener('timeupdate', setFillFromTime);
      audioEl.addEventListener('ended', () => {
        setPlayIcon(false);
        fillEl.style.width = '100%';
      });

      playBtn.addEventListener('click', () => {
        if (audioEl.paused) {
          audioEl.play().catch(() => {});
          setPlayIcon(true);
        } else {
          audioEl.pause();
          setPlayIcon(false);
        }
      });
    }
  }
}

async function toggleReaction(emoji, msgId, msgData) {
  if (!currentUser) return;
  
  const currentReactions = msgData.reactions || [];
  const existingIndex = currentReactions.findIndex(r => r.userId === currentUser.uid);
  
  try {
    if (existingIndex >= 0) {
      // User already has a reaction - check if same emoji
      if (currentReactions[existingIndex].emoji === emoji) {
        // Same emoji - remove reaction
        await removeReaction(msgId, currentReactions, existingIndex);
      } else {
        // Different emoji - update reaction
        await updateReaction(msgId, currentReactions, existingIndex, emoji);
      }
    } else {
      // No existing reaction - add new one
      await addReaction(msgId, currentReactions, emoji);
    }
    
    closeReactionPicker();
  } catch (error) {
    console.error("Error toggling reaction:", error);
  }
}

  const newReaction = {

    userId: currentUser.uid,
    userName: userName,
    timestamp: Date.now()

function displayReactions(reactions) {
  if (!reactions || reactions.length === 0) return "";
  
  // Group reactions by emoji
  const grouped = {};
  reactions.forEach(r => {

  });
  
  // Build reaction display
  let html = '<div class="message-reactions">';

const MESSAGE_EDIT_TIME_LIMIT = 15 * 60 * 1000; // 15 minutes in milliseconds

// Check if message can be edited (within 15 minutes)
function canMessageBeEdited(msgData) {
  if (!msgData.timestamp) return false;
  
  const msgTime = msgData.timestamp.toDate ? msgData.timestamp.toDate().getTime() : new Date(msgData.timestamp).getTime();
  const now = Date.now();
  const timeDiff = now - msgTime;
  
  return timeDiff < MESSAGE_EDIT_TIME_LIMIT;
}

}

// Ensure chat entry exists before sending message
async function ensureChatExists() {
  if (!currentUser || !contactId) return;
  
  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  if (!userDoc.exists()) return;
  
  const userData = userDoc.data();
  const chatId = currentUser.uid < contactId ? "chat_" + currentUser.uid + "_" + contactId : "chat_" + contactId + "_" + currentUser.uid;
  
  // Check if chat already exists
  if (!userData.chats || !userData.chats.find(chat => chat.chatId === chatId)) {
    // Create chat entry for current user
    await updateDoc(doc(db, "users", currentUser.uid), {
      chats: arrayUnion({ chatId: chatId, contactId: contactId })
    });
    
    // Create chat entry for contact
    const contactDoc = await getDoc(doc(db, "users", contactId));
    if (contactDoc.exists()) {
      const contactData = contactDoc.data();
      await updateDoc(doc(db, "users", contactId), {
        chats: arrayUnion({ chatId: chatId, contactId: currentUser.uid })
      });
    }
    
    // Create chat document
    await setDoc(doc(db, "chats", chatId), { messages: [] });
    
    console.log("Chat entry created");
  }
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text || !currentUser || !contactId) return;
  
  try {
    // Ensure chat entry exists before sending
    await ensureChatExists();
    
    // Get current user's profile info for group messages
    const userDoc = await getDoc(doc(db, "users", currentUser.uid));
    const userData = userDoc.exists() ? userDoc.data() : {};
    const senderName = isGroupChat ? `${userData.firstName || ''} ${userData.lastName || ''}`.trim() : null;
    const senderImage = userData.profileImageUrl || null;
    
    // Prepare message data
    const messageData = {
      type: "text",
      text: text,
      senderId: currentUser.uid,
      receiverId: contactId,
      timestamp: serverTimestamp(),
      read: false
    };
    
    // Add sender info for group messages
    if (isGroupChat) {
      messageData.senderName = senderName;
      messageData.senderImage = senderImage;
      messageData.isGroupMessage = true;
      messageData.groupId = groupId;
    }
    
    await addDoc(collection(db, "messages"), messageData);
    
    console.log("Sent:", text);
    messageInput.value = "";
    
  } catch (error) {
    console.error("Error:", error);
    alert("Error: " + error.message);
  }
}

// =====================
// VOICE RECORDING WITH WAVEFORM ANIMATION
// =====================

const voiceRecordingUI = document.getElementById("voice-recording-ui");
const waveformCanvas = document.getElementById("waveform-canvas");
const recordingTimer = document.getElementById("recording-timer");
const pauseRecordingBtn = document.getElementById("pause-recording");
const cancelRecordingBtn = document.getElementById("cancel-recording");
let timerInterval = null;

voiceRecordBtn.addEventListener("mousedown", startRecording);
voiceRecordBtn.addEventListener("touchstart", startRecording);
voiceRecordBtn.addEventListener("mouseup", stopRecording);
voiceRecordBtn.addEventListener("mouseleave", stopRecording);
voiceRecordBtn.addEventListener("touchend", stopRecording);

// Pause/Resume button
pauseRecordingBtn.addEventListener("click", togglePauseRecording);
cancelRecordingBtn.addEventListener("click", cancelRecording);

function togglePauseRecording() {
  if (!mediaRecorder) return;
  
  if (isPaused) {
    // Resume recording
    mediaRecorder.resume();
    isPaused = false;
    pauseRecordingBtn.innerHTML = '<i class="ri-pause-fill"></i>';
    recordingTimer.style.color = "#333";
    // Resume timer
    recordingStartTime = Date.now() - pausedTime;
    timerInterval = setInterval(updateRecordingTimer, 1000);
    // Resume waveform animation
    if (animationId) cancelAnimationFrame(animationId);
    drawWaveform();
    console.log("Recording resumed");
  } else {
    // Pause recording
    mediaRecorder.pause();
    isPaused = true;
    pausedTime = Date.now() - recordingStartTime;
    pauseRecordingBtn.innerHTML = '<i class="ri-play-fill"></i>';
    recordingTimer.style.color = "#e74c3c";
    // Pause timer
    clearInterval(timerInterval);
    // Pause waveform
    if (animationId) cancelAnimationFrame(animationId);
    console.log("Recording paused");
  }
}

function cancelRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
    isRecording = false;
    isPaused = false;
    clearInterval(timerInterval);
    if (animationId) cancelAnimationFrame(animationId);
    voiceRecordingUI.style.display = "none";
    voiceRecordBtn.classList.remove("recording");
    messageInput.placeholder = "Type your message...";
    if (recordingTimeout) clearTimeout(recordingTimeout);
    console.log("Recording cancelled");
  }
}

function updateRecordingTimer() {
  if (!recordingStartTime) return;
  
  const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;
  recordingTimer.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

function drawWaveform() {
  if (!audioContext || !analyser || !isRecording || isPaused) return;
  
  const canvas = waveformCanvas;
  const ctx = canvas.getContext("2d");
  const width = canvas.width;
  const height = canvas.height;
  
  analyser.getByteTimeDomainData(dataArray);
  
  ctx.fillStyle = "#f0f0f0";
  ctx.fillRect(0, 0, width, height);
  
  ctx.lineWidth = 2;
  ctx.strokeStyle = isPaused ? "#e74c3c" : "#667eea";
  ctx.beginPath();
  
  const sliceWidth = width / dataArray.length;
  let x = 0;
  
  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128.0;
    const y = (v * height) / 2;
    
    if (i === 0) {
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
    
    x += sliceWidth;
  }
  
  ctx.lineTo(canvas.width, canvas.height / 2);
  ctx.stroke();
  
  animationId = requestAnimationFrame(drawWaveform);
}

async function startRecording(e) {
  e.preventDefault();
  console.log("Starting recording...");
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    
    // Set up audio context for waveform visualization
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 2048;
    dataArray = new Uint8Array(analyser.fftSize);
    
    mediaRecorder.ondataavailable = function(event) {
      if (event.data.size > 0) audioChunks.push(event.data);
    };
    
    mediaRecorder.onstop = async function() {
      stream.getTracks().forEach(track => track.stop());
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      
      if (audioChunks.length === 0) return;
      
      const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
      
      try {
        sendButton.disabled = true;
        messageInput.placeholder = "Uploading voice...";
        voiceRecordingUI.style.display = "none";
        
        // Ensure chat entry exists before sending
        await ensureChatExists();
        
        const storageRef = ref(storage, "audio/" + currentUser.uid + "/" + Date.now() + "_voice.webm");
        const snapshot = await uploadBytes(storageRef, audioBlob);
        const downloadURL = await getDownloadURL(snapshot.ref);
        
        await addDoc(collection(db, "messages"), {
          type: "audio",
          audioUrl: downloadURL,
          senderId: currentUser.uid,
          receiverId: contactId,
          timestamp: serverTimestamp(),
          read: false
        });
        
        console.log("Voice sent!");
      } catch (error) {
        console.error("Error sending voice:", error);
      } finally {
        sendButton.disabled = false;
        messageInput.placeholder = "Type your message...";
        voiceRecordBtn.classList.remove("recording");
        isPaused = false;
        pausedTime = 0;
        clearInterval(timerInterval);
      }
    };
    
    // Show recording UI
    voiceRecordingUI.style.display = "flex";
    recordingTimer.textContent = "0:00";
    pauseRecordingBtn.innerHTML = '<i class="ri-pause-fill"></i>';
    
    // Start recording
    mediaRecorder.start(100);
    isRecording = true;
    isPaused = false;
    recordingStartTime = Date.now();
    pausedTime = 0;
    voiceRecordBtn.classList.add("recording");
    messageInput.placeholder = "Recording... Release to send";
    
    // Start timer
    timerInterval = setInterval(updateRecordingTimer, 1000);
    
    // Start waveform animation
    drawWaveform();
    
    // Auto-stop after 5 minutes
    recordingTimeout = setTimeout(() => { 
      if (isRecording) stopRecording(); 
    }, 300000);
    
  } catch (error) {
    console.error("Error accessing microphone:", error);
    alert("Error accessing microphone: " + error.message);
  }
}

function stopRecording(e) {
  if (e) e.preventDefault();

    isRecording = false;
    isPaused = false;
    voiceRecordBtn.classList.remove("recording");
    messageInput.placeholder = "Type your message...";
    if (recordingTimeout) clearTimeout(recordingTimeout);
    clearInterval(timerInterval);
    voiceRecordingUI.style.display = "none";
  }
}

  } else if (["doc", "docx"].indexOf(extension) !== -1) {

  } else if (extension === "txt") {

    fetch(url)

      .then(function(text) {
        documentContent.innerHTML = '<pre style="color: white; background: #333; padding: 20px; border-radius: 8px; max-width: 80vw; max-height: 70vh; overflow: auto; white-space: pre-wrap;">' + text + "</pre>";
      })
      .catch(function(err) {
        documentContent.innerHTML = '<p style="color: white;">Unable to preview this file</p>';
      });
  } else {
    // Default file icon
    documentContent.innerHTML = '<div style="text-align: center; color: white;"><i class="ri-file-line" style="font-size: 80px; color: #9E9E9E;"></i><p style="margin-top: 20px;">' + fileName + "</p></div>";

async function sendDocumentToContact(contactId, contactData) {
  if (!pendingDocumentForSending || !currentUser) return;
  
  const sendBtn = document.getElementById("send-to-contact");
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<i class="ri-loader-line"></i> Sending...';
  
  try {
    // Create chat if not exists
    const chatId = currentUser.uid < contactId ? "chat_" + currentUser.uid + "_" + contactId : "chat_" + contactId + "_" + currentUser.uid;
    
    const userDoc = await getDoc(doc(db, "users", currentUser.uid));
    if (userDoc.exists()) {
      const userData = userDoc.data();
      if (!userData.chats || !userData.chats.find(c => c.chatId === chatId)) {
        await updateDoc(doc(db, "users", currentUser.uid), {
          chats: arrayUnion({ chatId: chatId, contactId: contactId })
        });
        
        await updateDoc(doc(db, "users", contactId), {
          chats: arrayUnion({ chatId: chatId, contactId: currentUser.uid })
        });
        
        await setDoc(doc(db, "chats", chatId), { messages: [] });
      }
    }
    
    // Send document as message
    await addDoc(collection(db, "messages"), {
      type: "document",
      documentUrl: pendingDocumentForSending.url,
      documentName: pendingDocumentForSending.name || "Document",
      documentSize: 0,
      senderId: currentUser.uid,
      receiverId: contactId,
      timestamp: serverTimestamp(),
      read: false
    });
    
    alert("Document sent to " + (contactData.firstName + " " + contactData.lastName));
    
    // Close modals
    document.getElementById("contact-select-modal").style.display = "none";
    document.getElementById("document-viewer-modal").style.display = "none";
    
    pendingDocumentForSending = null;
    
  } catch (error) {
    console.error("Error sending document:", error);
    alert("Error sending document: " + error.message);
  } finally {
    sendBtn.disabled = false;
    sendBtn.innerHTML = '<i class="ri-send-plane-line"></i> Send to Contact';
  }
}

// Handle new message notification - simplified version
function handleNewMessageNotification(msg) {
  // Only notify for received messages
  if (msg.senderId === currentUser?.uid) return;
  
  // Get current contact/group from URL
  const urlParams = new URLSearchParams(window.location.search);
  const currentContactId = urlParams.get("contactId");
  const currentGroupId = urlParams.get("groupId");
  
  // Don't show notification if we're in the chat with this person
  if (msg.senderId === currentContactId || msg.senderId === currentGroupId) return;
  
  // Increment badge count for new messages
  if (window.incrementBadge) {
    window.incrementBadge();
    if (window.updateBadgeDisplay) {
      window.updateBadgeDisplay(window.getUnreadCount());
    }
  }
  
  // Show push notification if available
  if (window.showNotification) {
    const prefs = window.getNotificationPrefs ? window.getNotificationPrefs() : { pushEnabled: true };
    if (prefs.pushEnabled) {
      window.showNotification({
        title: msg.senderName || 'New Message',
        body: msg.type === 'text' ? msg.text : (msg.type === 'image' ? 'Sent a photo' : 'Sent a voice message')
      }, {
        contactId: msg.senderId,
        groupId: msg.groupId,
        messageId: msg.id
      });
    }
  }
}

function loadAllMessages() {
  getDocs(collection(db, "messages")).then(snapshot => {
    allMessages = [];
    snapshot.forEach(doc => {
      const msg = doc.data();
      msg.id = doc.id;
      
      // Check if message is between current user and contact
      const isFromContact = msg.senderId === contactId;
      const isToContact = msg.receiverId === contactId;
      const isFromUser = msg.senderId === currentUser?.uid;
      const isToUser = msg.receiverId === currentUser?.uid;
      
      if ((isFromContact && isToUser) || (isFromUser && isToContact)) {
        allMessages.push(msg);
      }
    });
    
    // Sort by timestamp
    allMessages.sort((a, b) => {
      const timeA = a.timestamp ? (a.timestamp.toDate ? a.timestamp.toDate().getTime() : new Date(a.timestamp).getTime()) : 0;
      const timeB = b.timestamp ? (b.timestamp.toDate ? b.timestamp.toDate().getTime() : new Date(b.timestamp).getTime()) : 0;
      return timeA - timeB;
    });
  });
}

let searchResults = [];
let currentSearchIndex = -1;

function searchMessages(query) {
  if (!query.trim()) {
    document.getElementById("search-count").textContent = "";
    clearHighlights();
    return;
  }
  
  query = query.toLowerCase();
  searchResults = [];
  
  allMessages.forEach(msg => {
    if (msg.type === "text" && msg.text && msg.text.toLowerCase().includes(query)) {
      searchResults.push(msg.id);
    }
  });
  
  currentSearchIndex = searchResults.length > 0 ? 0 : -1;
  
  // Update count
  const countSpan = document.getElementById("search-count");
  if (searchResults.length > 0) {
    countSpan.textContent = `1/${searchResults.length}`;
    highlightResult(searchResults[0]);
  } else {
    countSpan.textContent = "No results";
    clearHighlights();
  }
}

function highlightResult(msgId) {
  clearHighlights();
  
  const msgDiv = document.querySelector(`[data-id="${msgId}"]`);
  if (msgDiv) {
    msgDiv.style.background = "#fff3cd";
    msgDiv.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

function clearHighlights() {
  document.querySelectorAll("#chat-messages > div").forEach(div => {
    div.style.background = "";
  });
}

function navigateSearch(direction) {
  if (searchResults.length === 0) return;
  
  currentSearchIndex += direction;
  
  if (currentSearchIndex < 0) currentSearchIndex = searchResults.length - 1;
  if (currentSearchIndex >= searchResults.length) currentSearchIndex = 0;
  
  document.getElementById("search-count").textContent = `${currentSearchIndex + 1}/${searchResults.length}`;
  highlightResult(searchResults[currentSearchIndex]);
}

function closeSearch() {
  const searchBar = document.getElementById("search-bar");
  if (searchBar) {
    searchBar.remove();
    chatHeader.style.marginTop = "";
    clearHighlights();
  }
}

function formatLastSeen(timestamp) {
  if (!timestamp) return "unknown";
  
  let date;
  if (timestamp.toDate) {
    date = timestamp.toDate();
  } else {
    date = new Date(timestamp);
  }
  
  const now = new Date();
  const diff = now - date;
  
  // If less than 1 minute
  if (diff < 60000) {
    return "just now";
  }
  
  // If less than 1 hour
  if (diff < 3600000) {
    const mins = Math.floor(diff / 60000);
    return mins + " minute" + (mins > 1 ? "s" : "") + " ago";
  }
  
  // If less than 24 hours
  if (diff < 86400000) {
    const hours = Math.floor(diff / 3600000);
    return hours + " hour" + (hours > 1 ? "s" : "") + " ago";
  }
  
  // If less than 7 days
  if (diff < 604800000) {
    const days = Math.floor(diff / 86400000);
    return days + " day" + (days > 1 ? "s" : "") + " ago";
  }
  
  // Otherwise show date
  return date.toLocaleDateString();
}

function closeSenderInfoPanel() {

        senderInfoPanel.remove();
        senderInfoPanel = null;
      }
      if (panelOverlay) {
        panelOverlay.remove();
        panelOverlay = null;
      }
    }, 300);
  }
}

  modal.style.cssText = `

    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
<h3 style="margin: 0;">Edit Group</h3>

  let selectedEditImage = null;
  const imageContainer = document.getElementById("edit-group-image-container");
  const imageOverlay = document.getElementById("edit-image-overlay");
  
  if (imageContainer && imageOverlay) {
    imageContainer.addEventListener("mouseenter", () => { imageOverlay.style.opacity = "1"; });
    imageContainer.addEventListener("mouseleave", () => { imageOverlay.style.opacity = "0"; });
    imageContainer.addEventListener("click", () => { fileInput.click(); });
    
    fileInput.addEventListener("change", (e) => {

      if (file) {
        selectedEditImage = file;
        const reader = new FileReader();
        reader.onload = (event) => {
          document.getElementById("edit-group-preview-image").src = event.target.result;

      if (selectedEditImage) {
        try {
          const storageRef = ref(storage, "group_images/" + groupId + "_" + Date.now());

          console.error("Error uploading group image:", imageError);

      await updateDoc(doc(db, "groups", groupId), updateData);

    } catch (error) {
      console.error("Error updating group:", error);
      alert("Error updating group: " + error.message);
      saveBtn.disabled = false;
      saveBtn.textContent = "Save Changes";
    }
  });
}
